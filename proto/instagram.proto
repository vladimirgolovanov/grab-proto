syntax = "proto3";

package grab_proto.instagram;

option go_package = "github.com/vladimirgolovanov/grab-proto/gen/instagram;grab_instagram";

service Instagram {
  rpc CheckUsername (CheckUsernameRequest) returns (stream CheckUsernameResponse);
  rpc GetPost (GetPostRequest) returns (stream PostResponse);
}

message CheckUsernameRequest {
  repeated string usernames = 1;
}

message CheckUsernameResponse {
  string username = 1;
  bool exists = 2;
  string error = 3;
}

message GetPostRequest {
  repeated string post_urls = 1;
}

message PostResponse {
  string post_url = 1;
  string text = 2;
  string image_url = 3;
  string error = 4;
  bytes image_data = 5;
}
